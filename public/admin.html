<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — House Blessing RSVPs</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --cream: #FFF8EC; --gold: #99AD7A; --brown: #546B41;
      --text: #546B41; --muted: #99AD7A; --white: #fff;
      --shadow: rgba(84,107,65,0.12);
    }
    body { font-family: 'Jost', sans-serif; background: var(--cream); color: var(--text); min-height: 100vh; }

    .header {
      background: var(--brown);
      color: var(--white);
      padding: 20px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .header h1 { font-family: 'Cormorant Garamond', serif; font-size: 1.5rem; font-weight: 300; }
    .header span { font-size: .8rem; opacity: .6; }
    .logout-btn {
      background: none;
      border: 1px solid rgba(255, 255, 255, 0.3);
      color: var(--white);
      padding: 6px 12px;
      border-radius: 3px;
      font-family: 'Jost', sans-serif;
      font-size: .8rem;
      letter-spacing: .05em;
      cursor: pointer;
      transition: background .2s, border-color .2s;
    }
    .logout-btn:hover {
      background: rgba(255, 255, 255, 0.1);
      border-color: rgba(255, 255, 255, 0.5);
    }

    .login-wrap {
      max-width: 380px;
      margin: 80px auto;
      background: var(--white);
      border-radius: 4px;
      padding: 40px;
      box-shadow: 0 8px 32px var(--shadow);
      border-top: 3px solid var(--gold);
      text-align: center;
    }
    .login-wrap h2 { font-family: 'Cormorant Garamond', serif; font-size: 1.6rem; color: var(--brown); margin-bottom: 24px; }
    .login-wrap input {
      width: 100%; padding: 11px 14px; border: 1px solid #ddd3c3;
      border-radius: 3px; font-family: 'Jost', sans-serif; font-size: .95rem;
      color: var(--text); background: var(--cream); outline: none;
      transition: border-color .2s;
    }
    .login-wrap input:focus { border-color: var(--gold); }
    .login-wrap button {
      margin-top: 14px; width: 100%; padding: 13px;
      background: var(--gold); color: var(--white); border: none;
      border-radius: 3px; font-family: 'Jost', sans-serif;
      font-size: .85rem; letter-spacing: .1em; text-transform: uppercase;
      cursor: pointer; transition: background .2s;
    }
    .login-wrap button:hover { background: var(--brown); }

    .admin-wrap { max-width: 900px; margin: 40px auto; padding: 0 24px 80px; }

    .stats-row { display: flex; gap: 20px; margin-bottom: 32px; flex-wrap: wrap; }
    .stat-card {
      background: var(--white); border-radius: 4px; padding: 24px 32px;
      box-shadow: 0 2px 16px var(--shadow); border-top: 2px solid var(--gold);
      flex: 1; min-width: 140px; text-align: center;
    }
    .stat-num { font-family: 'Cormorant Garamond', serif; font-size: 2.4rem; color: var(--gold); }
    .stat-label { font-size: .75rem; letter-spacing: .1em; text-transform: uppercase; color: var(--muted); margin-top: 4px; }

    table { width: 100%; border-collapse: collapse; background: var(--white); border-radius: 4px; overflow: hidden; box-shadow: 0 2px 16px var(--shadow); }
    thead { background: var(--brown); color: var(--white); }
    th { padding: 14px 16px; text-align: left; font-size: .75rem; letter-spacing: .1em; text-transform: uppercase; font-weight: 500; }
    td { padding: 14px 16px; border-bottom: 1px solid #f0e8d8; font-size: .9rem; vertical-align: top; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #fdf8f2; }
    .badge {
      display: inline-block; padding: 3px 10px;
      background: rgba(184,146,74,.12); color: var(--gold);
      border-radius: 99px; font-size: .75rem; font-weight: 500;
    }
    .attendee-tag {
      display: inline-block; background: var(--cream);
      border: 1px solid #ddd3c3; border-radius: 3px;
      padding: 2px 8px; margin: 2px 2px 2px 0;
      font-size: .82rem; color: var(--brown);
    }
    .msg-text { color: var(--muted); font-style: italic; font-size: .85rem; }
    .ts { font-size: .78rem; color: var(--muted); }

    .export-btn {
      margin-bottom: 20px;
      padding: 10px 20px;
      background: none;
      border: 1px solid var(--gold);
      color: var(--gold);
      border-radius: 3px;
      font-family: 'Jost', sans-serif;
      font-size: .82rem;
      letter-spacing: .08em;
      cursor: pointer;
      transition: background .2s;
    }
    .delete-btn {
      padding: 8px 12px;
      background: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
      border-radius: 3px;
      font-family: 'Jost', sans-serif;
      font-size: .8rem;
      cursor: pointer;
      transition: background .2s, border-color .2s;
    }
    .delete-btn:hover { background: #f1b0b7; border-color: #f1b0b7; }
    .action-cell { width: 110px; }

  </style>
</head>
<body>

<div class="header">
  <h1> House Blessing — RSVPs</h1>
  <div style="display: flex; align-items: center; gap: 16px;">
    <span>Admin Dashboard</span>
    <button class="logout-btn" id="logout-btn" onclick="logout()" style="display: none;">Logout</button>
  </div>
</div>

<div id="login-wrap" class="login-wrap">
  <h2>Admin Access</h2>
  <input type="password" id="secret-input" placeholder="Enter admin password" />
  <button onclick="loadData()">View RSVPs</button>
  <div id="login-err" style="color:#c0392b;font-size:.85rem;margin-top:12px;"></div>
</div>

<div id="admin-wrap" class="admin-wrap" style="display:none;">
  <div class="stats-row">
    <div class="stat-card"><div class="stat-num" id="s-families">—</div><div class="stat-label">Families</div></div>
    <div class="stat-card"><div class="stat-num" id="s-guests">—</div><div class="stat-label">Total Guests</div></div>
  </div>

  <button class="export-btn" onclick="exportCSV()">⬇ Export CSV</button>

  <table>
    <thead>
      <tr>
        <th>#</th>
        <th>Family / Group</th>
        <th>Attendees</th>
        <th>Count</th>
        <th>Message</th>
        <th>Submitted</th>
        <th>Action</th>
      </tr>
    </thead>
    <tbody id="rsvp-tbody"></tbody>
  </table>
</div>

<script>
  let currentSecret = '';
  let currentData = [];

  document.getElementById('secret-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') loadData();
  });

  async function loadData() {
    const secret = document.getElementById('secret-input').value.trim();
    if (!secret) return;

    try {
      const res  = await fetch(`/api/rsvps?secret=${encodeURIComponent(secret)}`);
      const data = await res.json();

      if (!res.ok) {
        document.getElementById('login-err').textContent = data.error || 'Unauthorized';
        return;
      }

      currentSecret = secret;
      currentData   = data.rsvps;

      document.getElementById('login-wrap').style.display = 'none';
      document.getElementById('admin-wrap').style.display = 'block';
      document.getElementById('logout-btn').style.display = 'block';

      document.getElementById('s-families').textContent = data.total_families;
      document.getElementById('s-guests').textContent   = data.total_attendees;

      const tbody = document.getElementById('rsvp-tbody');
      if (data.rsvps.length === 0) {
        tbody.innerHTML = '<tr><td colspan="6" class="empty">No RSVPs yet.</td></tr>';
        return;
      }

      tbody.innerHTML = data.rsvps.map((r, i) => `
        <tr>
          <td>${i + 1}</td>
          <td><strong>${esc(r.family_name)}</strong></td>
          <td>${r.attendees.map(n => `<span class="attendee-tag">${esc(n)}</span>`).join('')}</td>
          <td><span class="badge">${r.attendee_count}</span></td>
          <td class="msg-text">${r.message ? esc(r.message) : '<span style="opacity:.4">—</span>'}</td>
          <td class="ts">${new Date(r.created_at).toLocaleString()}</td>
          <td class="action-cell"><button class="delete-btn" onclick="deleteRsvp('${r.id}')">Delete</button></td>
        </tr>
      `).join('');
    } catch (e) {
      document.getElementById('login-err').textContent = 'Network error. Please try again.';
    }
  }

  function esc(str) {
    return String(str)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;');
  }

  function exportCSV() {
    if (!currentData.length) return;
    const rows = [['#','Family','Attendees','Count','Message','Date']];
    currentData.forEach((r, i) => {
      rows.push([
        i + 1,
        `"${r.family_name.replace(/"/g,'""')}"`,
        `"${r.attendees.join(', ').replace(/"/g,'""')}"`,
        r.attendee_count,
        `"${(r.message || '').replace(/"/g,'""')}"`,
        new Date(r.created_at).toLocaleString()
      ]);
    });
    const csv = rows.map(r => r.join(',')).join('\n');
    const a = document.createElement('a');
    a.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent(csv);
    a.download = 'rsvps.csv';
    a.click();
  }

  async function deleteRsvp(id) {
    if (!confirm('Delete this RSVP? This cannot be undone.')) return;
    try {
      const res = await fetch(`/api/rsvp/${id}?secret=${encodeURIComponent(currentSecret)}`, { method: 'DELETE' });
      const data = await res.json();
      if (!res.ok) {
        alert(data.error || 'Could not delete RSVP.');
        return;
      }
      localStorage.setItem('rsvp-updated', Date.now());
      loadData();
    } catch (e) {
      alert('Network error. Please try again.');
    }
  }

  function logout() {
    currentSecret = '';
    currentData = [];
    document.getElementById('secret-input').value = '';
    document.getElementById('login-err').textContent = '';
    document.getElementById('login-wrap').style.display = 'block';
    document.getElementById('admin-wrap').style.display = 'none';
    document.getElementById('logout-btn').style.display = 'none';
    window.location.href = '/';
  }
</script>
</body>
</html>
